{% extends "frontend/base_auth.html" %}
{% block title %}Forgot Password{% endblock %}

{% block body %}
<div class="auth-card">
  <div class="brand">
    <div class="brand-mark">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div class="card-title">Forgot your password?</div>
    <div class="card-sub">Enter your email and we'll send a reset link</div>
  </div>

  <div class="alert error"   id="alert-error"></div>
  <div class="alert success" id="alert-success"></div>

  <form id="forgot-form" novalidate>
    <div class="form-group">
      <label>Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <button type="submit" class="btn" id="forgot-btn">
      <span class="btn-text">Send Reset Link</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer-links">
    Remembered it? <a href="/login/">Back to login</a>
  </div>
</div>

<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('forgot-btn');
    const errEl = document.getElementById('alert-error');
    const okEl  = document.getElementById('alert-success');

    const email = document.getElementById('email').value.trim();

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // authemail endpoint: POST /api/auth/password/reset/
      const res = await fetch(`${window.location.origin}/api/auth/password/reset/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (res.ok) {
        okEl.textContent = 'Reset link sent! Check your inbox.';
        okEl.classList.add('show');
        document.getElementById('forgot-form').reset();
      } else {
        const msg = data.detail || data.email?.[0] || 'Could not send reset email.';
        errEl.textContent = msg;
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
