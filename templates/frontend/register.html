{% extends "frontend/base_auth.html" %}
{% block title %}Register{% endblock %}

{% block body %}
<div class="auth-card">
  <div class="brand">
    <div class="brand-mark">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
      </svg>
    </div>
    <div class="card-title">Create account</div>
    <div class="card-sub">Join us — it only takes a moment</div>
  </div>

  <div class="alert error" id="alert-error"></div>
  <div class="alert success" id="alert-success"></div>

  <form id="register-form" novalidate>
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="Jane Doe" autocomplete="name" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
    </div>

      <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="amrozz" autocomplete="username" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <div class="form-group">
      <label>Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="password2" placeholder="Repeat your password" autocomplete="new-password" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
    </div>

    <button type="submit" class="btn" id="register-btn">
      <span class="btn-text">Create Account</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer-links">
    Already have an account? <a href="/login/">Sign in</a>
  </div>
</div>

<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    const errEl = document.getElementById('alert-error');
    const okEl  = document.getElementById('alert-success');

    const name      = document.getElementById('name').value.trim();
    const email     = document.getElementById('email').value.trim();
    const username  = document.getElementById('username').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (password !== password2) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch(`${window.location.origin}/api/users/register/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name: name, email, username, password, password2 })
      });
      const data = await res.json();

      if (res.ok) {
        okEl.textContent = 'Account created! Redirecting to login…';
        okEl.classList.add('show');
        setTimeout(() => window.location.href = '/login/', 1500);
      } else {
        const msg = data.detail || data.email?.[0] || data.password?.[0] || 'Registration failed.';
        errEl.textContent = msg;
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
