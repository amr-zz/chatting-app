{% extends "frontend/base_auth.html" %}
{% block title %}Reset Password{% endblock %}

{% block body %}
<div class="auth-card">
  <div class="brand">
    <div class="brand-mark">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
    </div>
    <div class="card-title">Reset your password</div>
    <div class="card-sub">Choose a strong new password</div>
  </div>

  <div class="alert error"   id="alert-error"></div>
  <div class="alert success" id="alert-success"></div>

  <form id="reset-form" novalidate>
    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
    </div>

    <!-- Password strength bar -->
    <div class="strength-wrap">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <span class="strength-label" id="strength-label"></span>
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <div class="input-wrap">
        <input type="password" id="password2" placeholder="Repeat new password" autocomplete="new-password" required />
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
    </div>

    <button type="submit" class="btn" id="reset-btn">
      <span class="btn-text">Set New Password</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer-links">
    <a href="/login/">Back to login</a>
  </div>
</div>

<style>
  .strength-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: -8px 0 18px;
  }
  .strength-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    transition: width 0.3s, background 0.3s;
  }
  .strength-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }
</style>

<script>
  // ---- Parse uid + token from URL: /reset-password/?uid=xxx&token=yyy ----
  const params = new URLSearchParams(window.location.search);
  const uid   = params.get('uid')   || '';
  const token = params.get('token') || '';

  // Password strength
  const pwInput = document.getElementById('password');
  const fill    = document.getElementById('strength-fill');
  const lbl     = document.getElementById('strength-label');

  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8)          score++;
    if (/[A-Z]/.test(v))        score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const colors = ['', '#f87171','#fb923c','#facc15','#34d399'];
    const labels = ['', 'Weak','Fair','Good','Strong'];
    fill.style.width    = (score * 25) + '%';
    fill.style.background = colors[score] || 'transparent';
    lbl.textContent     = labels[score] || '';
    lbl.style.color     = colors[score] || 'var(--muted)';
  });

  // Submit
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('reset-btn');
    const errEl = document.getElementById('alert-error');
    const okEl  = document.getElementById('alert-success');

    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const urlParams = new URLSearchParams(window.location.search);
    const code      = urlParams.get('code');
    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (password !== password2) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.classList.add('show');
      return;
    }
    if (!code) {
      errEl.textContent = 'Invalid or expired reset link.';
      errEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // authemail endpoint: POST /api/auth/password/reset/verified/
      const res = await fetch(`${window.location.origin}/api/auth/password/reset/verified/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, password })
      });
      const data = await res.json();

      if (res.ok) {
        okEl.textContent = 'Password updated! Redirecting to login…';
        okEl.classList.add('show');
        setTimeout(() => window.location.href = '/login/', 1500);
      } else {
        const msg = data.detail || data.password?.[0] || 'Reset failed. The link may have expired.';
        errEl.textContent = msg;
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
